<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PrintScreen 长截图</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <div class="header-icon">
        <img src="../icons/icon48.png" width="28" height="28" alt="PrintScreen" style="border-radius:6px;">
      </div>
      <div class="header-text">
        <h1 class="title">PrintScreen</h1>
        <span class="subtitle">长截图工具</span>
      </div>
      <div class="header-badge" id="pageStatus">
        <span class="badge-dot"></span>
        <span class="badge-text">检测中</span>
      </div>
    </header>

    <!-- Main Actions -->
    <div class="actions">
      <button id="btnCapture" class="btn btn-primary">
        <svg class="btn-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <circle cx="12" cy="12" r="3"/>
          <path d="M16 2l-4 4-4-4M12 6v4"/>
        </svg>
        <span class="btn-label">截取长图</span>
      </button>

      <button id="btnCaptureViewport" class="btn btn-secondary" title="只截当前可见区域">
        <svg class="btn-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <rect x="2" y="4" width="20" height="16" rx="2"/>
          <path d="M2 8h20"/>
        </svg>
        <span class="btn-label">可视区域</span>
      </button>
    </div>

    <!-- Progress -->
    <div id="progressSection" class="card progress-card hidden">
      <div class="progress-header">
        <div class="progress-spinner"></div>
        <span id="progressText" class="progress-text">准备中...</span>
      </div>
      <div class="progress-track">
        <div id="progressBar" class="progress-bar"></div>
      </div>
      <div class="progress-footer">
        <span id="progressDetail" class="progress-detail">正在截图</span>
        <span id="progressPercentage" class="progress-pct">0%</span>
      </div>
    </div>

    <!-- Settings -->
    <div class="card settings-card">
      <div class="settings-row">
        <div class="settings-label">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
          </svg>
          <span>导出格式</span>
        </div>
        <div class="settings-control">
          <div class="segmented-control" id="formatSelect">
            <button class="seg-option active" data-value="png">PNG</button>
            <button class="seg-option" data-value="jpeg">JPEG</button>
            <button class="seg-option" data-value="pdf">PDF</button>
          </div>
        </div>
      </div>

      <div class="settings-row">
        <div class="settings-label">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
          <span>滚动延迟</span>
        </div>
        <div class="settings-control">
          <input type="range" id="delayInput" class="range-slider" min="200" max="1500" value="500" step="50">
          <span id="delayValue" class="range-value">500ms</span>
        </div>
      </div>

      <div class="settings-row">
        <div class="settings-label">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
          </svg>
          <span>保存位置</span>
        </div>
        <div class="settings-control">
          <div class="input-group">
            <span class="input-prefix">~/Downloads/</span>
            <input type="text" id="savePathInput" class="input-text" placeholder="PrintScreen">
          </div>
        </div>
      </div>

      <div class="settings-row">
        <div class="settings-label">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
          </svg>
          <span>主题</span>
        </div>
        <div class="settings-control">
          <div class="segmented-control" id="themeSelect">
            <button class="seg-option active" data-value="auto">自动</button>
            <button class="seg-option" data-value="light">浅色</button>
            <button class="seg-option" data-value="dark">深色</button>
          </div>
        </div>
      </div>

      <div class="settings-row settings-row--last">
        <div class="settings-control settings-control--full">
          <label class="toggle">
            <input type="checkbox" id="saveAsCheck">
            <span class="toggle-track">
              <span class="toggle-thumb"></span>
            </span>
          </label>
          <span id="savePathHint" class="toggle-hint">📁 保存到 PrintScreen</span>
        </div>
      </div>
    </div>

    <!-- Messages -->
    <div id="messageSection" class="message hidden">
      <span id="messageText"></span>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <div class="shortcuts">
        <div class="shortcut-row">
          <span class="shortcut-action">打开弹窗</span>
          <kbd id="key-popup" class="shortcut-key">Ctrl+Shift+S</kbd>
        </div>
        <div class="shortcut-row">
          <span class="shortcut-action">一键截长图</span>
          <kbd id="key-capture" class="shortcut-key">Alt+Shift+S</kbd>
        </div>
      </div>
      <div class="footer-links">
        <a id="shortcutSettingsLink" class="shortcut-edit" href="#">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
          </svg>
          自定义快捷键
        </a>
        <a class="shortcut-edit feedback-link" href="mailto:24xzhuo@stu.edu.cn" title="反馈与建议">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
          <span>24xzhuo@stu.edu.cn</span>
        </a>
      </div>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
